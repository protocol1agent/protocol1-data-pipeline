name: Daily Sync

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync
        run: |
          curl -X POST https://connect.theprotocol1.com/api/sync \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
